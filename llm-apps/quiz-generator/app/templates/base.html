<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QuizForge{% endblock %} — QuizForge</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0f0e17; color: #e8e8f0; min-height: 100vh; }
        .brand { font-family: 'Playfair Display', serif; }

        .nav-bar {
            position: fixed; top: 0; width: 100%; z-index: 50;
            background: rgba(15,14,23,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .nav-inner { max-width: 1152px; margin: 0 auto; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-family: 'Playfair Display', serif; color: #818cf8; font-size: 1.25rem; font-weight: 700; text-decoration: none; }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-link { color: #9ca3af; font-size: 0.875rem; text-decoration: none; transition: color 0.2s; }
        .nav-link:hover { color: #fff; }
        .nav-link.active { color: #fff; }
        .nav-btn { background: #4f46e5; color: #fff; font-size: 0.875rem; font-weight: 500; padding: 0.5rem 1rem; border-radius: 0.5rem; text-decoration: none; transition: background 0.2s; }
        .nav-btn:hover { background: #4338ca; }

        .page-wrap { max-width: 1152px; margin: 0 auto; padding: 6rem 1.5rem 4rem; }

        .footer { border-top: 1px solid rgba(255,255,255,0.07); padding: 2rem 0; margin-top: 4rem; }
        .footer-inner { max-width: 1152px; margin: 0 auto; padding: 0 1.5rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
        .footer-copy { color: #4b5563; font-size: 0.875rem; }
        .footer-links { display: flex; gap: 1.5rem; }
        .footer-links a { color: #6b7280; font-size: 0.875rem; text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: #d1d5db; }

        {% block styles %}{% endblock %}
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">QuizForge</a>
            <div class="nav-links">
                <a href="/quizzes" class="nav-link">All Quizzes</a>
                <a href="/quizzes/new" class="nav-btn">+ Create Quiz</a>
            </div>
        </div>
    </nav>

    <div class="page-wrap">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <span class="brand" style="color:#818cf8; font-weight:700;">QuizForge</span>
            <p class="footer-copy">Built with FastAPI &amp; Amazon Bedrock</p>
            <div class="footer-links">
                <a href="/quizzes/new">Create</a>
                <a href="/quizzes">Quizzes</a>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
